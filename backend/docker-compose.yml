services:
  wedding-api:
    build: .
    environment:
      - WEDDING_API_KEY=${WEDDING_API_KEY}
      - COUPLE_NAME=${COUPLE_NAME}
      - COUPLE_IMAGE=/data/assets/couple.jpg
    volumes:
      - ./data:/data
    restart: unless-stopped
    networks:
      - wedding_net
  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: cloudflare-tunnel-wedding_api
    restart: always
    command: tunnel run --token ${CLOUDFLARE_TOKEN}
    networks:
      - wedding_net

networks:
  wedding_net:
    driver: bridge
